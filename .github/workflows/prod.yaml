name: Prod Deploy
on: [workflow_dispatch]

env:
  NAMESPACE: standalone
  PROJECT: nivaprod-1
  ENVIRONMENT: prod
  ZONE: europe-west1
  IMAGE_NAME: sk-review
  WORKDIR: ./

jobs:
  deploy:

    # We need access to the kubernetes cluster when deploying, so we
    # are using a runner that is deployed on the cluster.
    runs-on: ["nivaprod-1"]

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v1"
        with:
          token_format: access_token
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.WORKLOAD_IDENTITY_SA }}"

      - id: 'get-credentials'
        uses: 'google-github-actions/get-gke-credentials@v1'
        with:
          cluster_name: ${{ env.PROJECT }}-cluster
          location: ${{ env.ZONE }}
          project_id: ${{ env.PROJECT }}
          use_internal_ip: True

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        id: install

      - name: Deploy
        run: |-
          kubectl config set-context --current --namespace=${{ env.NAMESPACE }}
          kubectl apply -k ${{ env.WORKDIR }}/deployment/${{ env.ENVIRONMENT }}
          ATTEMPTS=0
          ROLLOUT_STATUS_CMD="kubectl rollout status deployment/sk-review"
          until $ROLLOUT_STATUS_CMD || [ $ATTEMPTS -eq 10 ]; do
            $ROLLOUT_STATUS_CMD
            ATTEMPTS=$((attempts + 1))
            sleep 60
          done
