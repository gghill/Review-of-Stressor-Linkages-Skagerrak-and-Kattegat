apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk-review
  labels:
    app: sk-review
spec:
  # shiny apps are stateful, and do not work very well with more than 1 replica
  # see discussion https://github.com/rstudio/shiny/issues/2455
  replicas: 1
  selector:
    matchLabels:
      app: sk-review
  template:
    metadata:
      labels:
        app: sk-review
    spec:
      serviceAccountName: shiny-apps
      containers:
      - name: sk-review
        image: europe-west1-docker.pkg.dev/niva-cd/images/sk-review:latest
        resources:
          requests:
            memory: "1G"
            cpu: "500m"
          limits:
            memory: "8G"
            cpu: "2"
        ports:
          - name: http
            containerPort: 3838
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 3838
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sk-review
spec:
  ports:
  - name: http
    targetPort: http
    port: 80
    protocol: TCP
  selector:
    app: sk-review
